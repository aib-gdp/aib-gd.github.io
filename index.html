<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Kuripe 😻</title>

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
  color:white;
  background: linear-gradient(to top, #0f2027, #203a43, #2c5364);
  overflow:hidden;
}

.page {display:none; padding:60px;}
.active {display:block;}

h1 {font-size:42px;}
p {font-size:24px;}

button {
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:white;
  color:#ff4d6d;
  cursor:pointer;
  margin-top:20px;
}

/* hearts */
.heart {
  position:fixed;
  top:-10px;
  color:red;
  animation:fall linear infinite;
}
@keyframes fall {to {transform:translateY(100vh);}}

/* stars */
.star {
  position:fixed;
  width:2px;
  height:2px;
  background:white;
}

/* gift */
.gift {
  font-size:90px;
  cursor:pointer;
}

/* close */
.close {
  position:fixed;
  top:10px;
  right:10px;
  font-size:18px;
}
</style>
</head>

<body>

<!-- 🎵 YOUR SONG -->
<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<button onclick="playMusic()">▶ Play Music 🎵</button>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<h1 id="typing"></h1>
<button onclick="next(2)">Start 💖</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
<h1>😂</h1>
<p>You are getting older 🎂😂</p>
<button onclick="next(3)">Next</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
<h1>😍</h1>
<p>But still the cutest person alive 💕</p>
<button onclick="next(4)">Next</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="p4">
<h1>❤️</h1>
<p>I'm lucky because you're mine 😌</p>
<button onclick="next(5)">Next</button>
</div>

<!-- COUNTDOWN -->
<div class="page" id="p5">
<h1>⏳ Countdown</h1>
<h1 id="count">3</h1>
<button onclick="startCountdown()">Start</button>
</div>

<!-- GIFT -->
<div class="page" id="p6">
<h1>🎁 Tap Gift</h1>
<div class="gift" onclick="openGift()">🎁</div>
</div>

<!-- FINAL -->
<div class="page" id="p7">
<h1>🎂 Happy Birthday Kuripe 😻</h1>
<button onclick="showLetter()">Open Letter 💌</button>
</div>

<!-- LETTER -->
<div class="page" id="p8">
<h1>💌 For You</h1>
<p id="letter"></p>
<button class="close" onclick="closeSite()">Close ❌</button>
</div>

<script>

/* navigation */
function next(n){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById('p'+n).classList.add('active');
}

/* typing */
let msg="Happy Birthday Kuripe 😻";
let i=0;
function type(){
 if(i<msg.length){
  document.getElementById("typing").innerHTML+=msg[i];
  i++;
  setTimeout(type,80);
 }
}
type();

/* music */
function playMusic(){
 document.getElementById("music").play();
}

/* countdown */
function startCountdown(){
 let n=3;
 let c=setInterval(()=>{
  document.getElementById("count").innerHTML=n;
  n--;
  if(n<0){
   clearInterval(c);
   next(6);
  }
 },1000);
}

/* gift */
function openGift(){
 alert("Surpriseeee 😍💞 Call me now ❤️📞");
 next(7);
}

/* love letter */
function showLetter(){
 next(8);
 let text="Happy Birthday Kuripe 😻\n\nYou are my happiness...\nMy peace...\nMy everything 💖\n\nI love you forever 😘";
 let i=0;
 function typeLetter(){
  if(i<text.length){
   document.getElementById("letter").innerHTML+=text[i];
   i++;
   setTimeout(typeLetter,50);
  }
 }
 typeLetter();
}

/* close */
function closeSite(){
 alert("I Love You 💖");
}

/* hearts */
function createHeart(){
 let h=document.createElement("div");
 h.classList.add("heart");
 h.innerHTML="❤️";
 h.style.left=Math.random()*100+"vw";
 h.style.animationDuration=(Math.random()*3+2)+"s";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),5000);
}
setInterval(createHeart,300);

/* stars */
for(let i=0;i<120;i++){
 let s=document.createElement("div");
 s.classList.add("star");
 s.style.top=Math.random()*100+"vh";
 s.style.left=Math.random()*100+"vw";
 document.body.appendChild(s);
}

</script>

</body>
</html>
